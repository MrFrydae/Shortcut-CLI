# Parent Story with Sub-Stories and Tasks
#
# Creates a parent story and two child sub-task stories using
# parent_story_id (requires the Sub-task feature enabled in your
# workspace).  Each story gets inline tasks.
#
# If your workspace does not have Sub-tasks enabled, you can use
# story_link operations with a "blocks" verb instead (see the
# commented-out alternative at the bottom).
#
# Demonstrates inline tasks arrays on story creation.
#
# Usage:
#   shortcut template validate examples/parent-with-substories.shortcut.yml
#   shortcut template run examples/parent-with-substories.shortcut.yml --dry-run
#   shortcut template run examples/parent-with-substories.shortcut.yml \
#     --var parent_name="Epic Feature" \
#     --var child_a_name="Frontend Work" \
#     --var child_b_name="Backend Work"

version: 1

meta:
  description: Parent story with two child sub-task stories and tasks on each

vars:
  parent_name: "Parent Story"
  child_a_name: "Child Story A"
  child_b_name: "Child Story B"

operations:
  # 1. Create the parent story with inline tasks
  - action: create
    entity: story
    alias: parent
    fields:
      name: "$var(parent_name)"
      type: feature
      tasks:
        - description: "Review requirements"
        - description: "Write acceptance criteria"

  # 2. Create two child stories as sub-tasks of the parent
  - action: create
    entity: story
    alias: children
    repeat:
      - name: "$var(child_a_name)"
        type: feature
        tasks:
          - description: "Implement feature"
          - description: "Write tests"
      - name: "$var(child_b_name)"
        type: feature
        tasks:
          - description: "Implement feature"
          - description: "Write tests"
    fields:
      parent_story_id: "$ref(parent)"

# --- Alternative: story_link approach (no Sub-task feature needed) ---
