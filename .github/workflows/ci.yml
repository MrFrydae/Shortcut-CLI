name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-quality-ubuntu-stable
          cache-workspace-crates: true
          cache-all-crates: true
          workspaces: |
            . -> target
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features --locked
      - name: Build docs with warnings as errors
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps --locked

  pr_quality_gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: [quality]
    steps:
      - run: echo "Quality checks passed for PR; running extended matrix jobs."

  build:
    runs-on: ${{ matrix.runner }}
    needs: [pr_quality_gate]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.pr_quality_gate.result == 'success') &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-build-${{ runner.os }}-${{ matrix.target }}-stable
          cache-workspace-crates: true
          cache-all-crates: true
          workspaces: |
            . -> target
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - run: cargo build --locked --release --target ${{ matrix.target }}

  test:
    runs-on: ${{ matrix.os }}
    needs: [pr_quality_gate]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.pr_quality_gate.result == 'success') &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-15-intel, ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-test-${{ runner.os }}-stable
          cache-workspace-crates: true
          cache-all-crates: true
          workspaces: |
            . -> target
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - run: cargo test --all-targets --locked

  toolchain:
    runs-on: ubuntu-latest
    needs: [pr_quality_gate]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.pr_quality_gate.result == 'success') &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: v2-toolchain-${{ matrix.channel }}-${{ runner.os }}
          cache-workspace-crates: true
          cache-all-crates: true
          workspaces: |
            . -> target
      - name: Install OpenSSL (Linux)
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - run: cargo test --locked

  audit:
    runs-on: ubuntu-latest
    needs: [pr_quality_gate]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.pr_quality_gate.result == 'success') &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Cargo Audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, pr_quality_gate, build, test, toolchain, audit]
    steps:
      - name: Verify job results
        run: |
          echo "quality=${{ needs.quality.result }}"
          echo "pr_quality_gate=${{ needs.pr_quality_gate.result }}"
          echo "build=${{ needs.build.result }}"
          echo "test=${{ needs.test.result }}"
          echo "toolchain=${{ needs.toolchain.result }}"
          echo "audit=${{ needs.audit.result }}"

          [[ "${{ needs.quality.result }}" == "success" ]] || exit 1

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            [[ "${{ needs.pr_quality_gate.result }}" == "success" ]] || exit 1
          fi

          [[ "${{ needs.build.result }}" == "success" ]] || exit 1
          [[ "${{ needs.test.result }}" == "success" ]] || exit 1
          [[ "${{ needs.toolchain.result }}" == "success" ]] || exit 1
          [[ "${{ needs.audit.result }}" == "success" ]] || exit 1

          echo "All CI checks passed."
