name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Sync Cargo.toml version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../shortcut-${{ github.ref_name }}-${{ matrix.target }}.tar.gz shortcut
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: shortcut-${{ matrix.target }}
          path: shortcut-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: shasum -a 256 shortcut-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            shortcut-*.tar.gz
            checksums.txt

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_GITHUB_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set, skipping Homebrew tap update"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_AARCH64_DARWIN=$(shasum -a 256 shortcut-${TAG}-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_64_DARWIN=$(shasum -a 256 shortcut-${TAG}-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86_64_LINUX=$(shasum -a 256 shortcut-${TAG}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_AARCH64_LINUX=$(shasum -a 256 shortcut-${TAG}-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          REPO_URL="https://github.com/MrFrydae/Shortcut-CLI/releases/download/${TAG}"

          cat > shortcut.rb << FORMULA
          class Shortcut < Formula
            desc "CLI for the Shortcut project management platform"
            homepage "https://github.com/MrFrydae/Shortcut-CLI"
            license "AGPL-3.0"

            on_macos do
              on_arm do
                url "${REPO_URL}/shortcut-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              end
              on_intel do
                url "${REPO_URL}/shortcut-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              on_arm do
                url "${REPO_URL}/shortcut-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              end
              on_intel do
                url "${REPO_URL}/shortcut-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "shortcut"

              generate_completions_from_executable(bin/"shortcut", "completions")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/shortcut --version")
            end
          end
          FORMULA

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/MrFrydae/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp shortcut.rb tap/Formula/shortcut.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shortcut.rb
          git commit -m "Update shortcut to ${VERSION}"
          git push
